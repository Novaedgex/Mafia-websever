<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Mafia Market — Admin</title>
<style>
:root{
  --bg:#0d0f12;--panel:#111418;--border:#1e2228;--header:#161a1f;
  --green:#23d18b;--yellow:#e5c07b;--red:#e06c75;--blue:#61afef;
  --purple:#c678dd;--cyan:#56b6c2;--dim:#4b5263;--text:#abb2bf;--bright:#dde1e8;
  --tab-h:52px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Cascadia Code','Fira Code','Courier New',monospace;font-size:13px}

/* ── Login ── */
#login-overlay{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;flex-direction:column;gap:16px;padding:24px}
#login-overlay h1{color:var(--bright);font-size:22px;letter-spacing:3px;text-align:center}
#login-overlay .sub{color:var(--dim);font-size:11px;letter-spacing:2px;margin-bottom:8px}
#login-overlay .note{color:var(--dim);font-size:12px;text-align:center}
#login-error{color:var(--red);font-size:12px;display:none;text-align:center}

/* ── App shell ── */
#app{display:none;height:100%;flex-direction:column}

/* ── Topbar ── */
#topbar{background:var(--header);border-bottom:1px solid var(--border);padding:0 14px;height:44px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{color:var(--bright);font-size:14px;font-weight:bold;letter-spacing:1px;white-space:nowrap}
.tbadge{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:2px 7px;font-size:10px;color:var(--dim);white-space:nowrap}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--dim);flex-shrink:0;transition:background .3s}
.status-dot.online{background:var(--green);box-shadow:0 0 5px var(--green)}
.status-label{font-size:11px;color:var(--dim);white-space:nowrap}
#user-info{display:flex;align-items:center;gap:8px;margin-left:auto}
#user-avatar{width:26px;height:26px;border-radius:50%;object-fit:cover;flex-shrink:0}
#user-name{color:var(--bright);font-size:11px;font-weight:bold}
#logout-btn{color:var(--dim);font-size:10px;text-decoration:none;border:1px solid var(--border);border-radius:4px;padding:2px 7px;white-space:nowrap}

/* ── Desktop: 2x2 grid ── */
#grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:1px;flex:1;overflow:hidden;background:var(--border)}

/* ── Mobile: single panel + tab bar ── */
@media(max-width:700px){
  body{font-size:14px}
  #topbar{height:48px;padding:0 12px}
  .logo{font-size:13px}
  .tbadge{display:none}
  #session-badge{display:none}
  #user-name{display:none}
  #grid{display:flex;flex-direction:column;overflow:hidden}
  .panel{display:none!important;flex:1}
  .panel.active{display:flex!important}
  #tab-bar{display:flex}
}
#tab-bar{display:none;background:var(--header);border-top:1px solid var(--border);height:var(--tab-h);flex-shrink:0}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--dim);font-family:inherit;font-size:9px;font-weight:bold;text-transform:uppercase;letter-spacing:.04em;padding:6px 4px;transition:color .15s;position:relative}
.tab-item.active{color:var(--blue)}
.tab-item.active::after{content:'';position:absolute;top:0;left:25%;right:25%;height:2px;background:var(--blue);border-radius:0 0 2px 2px}
.tab-icon{font-size:18px;line-height:1}
.tab-badge{position:absolute;top:6px;right:calc(25% - 4px);background:var(--red);color:#fff;border-radius:8px;padding:0 5px;font-size:9px;font-weight:bold;display:none}

/* ── Panel base ── */
.panel{background:var(--panel);display:flex;flex-direction:column;overflow:hidden}
.ph{background:var(--header);padding:8px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0}
.ph .title{color:var(--bright);font-size:12px;font-weight:bold;letter-spacing:.5px}
.ph .cnt{margin-left:auto;background:var(--border);border-radius:10px;padding:1px 8px;font-size:10px;color:var(--dim)}
.pbtn{background:none;border:1px solid var(--border);color:var(--dim);border-radius:4px;padding:3px 10px;font-size:11px;cursor:pointer;font-family:inherit;min-height:28px}
.pbtn:hover{border-color:var(--red);color:var(--red)}
.scroll{flex:1;overflow-y:auto;padding:4px 0;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{width:3px}
.scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.empty{color:var(--dim);font-size:12px;text-align:center;padding:32px 16px}

/* ── Terminal ── */
.log-line{display:flex;align-items:baseline;gap:8px;padding:3px 14px;line-height:1.7}
.log-ts{color:var(--dim);font-size:10px;flex-shrink:0}
.log-msg{white-space:pre-wrap;word-break:break-all;font-size:12px}
.log-line.success .log-msg{color:var(--green)}
.log-line.warn    .log-msg{color:var(--yellow)}
.log-line.error   .log-msg{color:var(--red)}
.log-line.debug   .log-msg{color:var(--dim)}
.log-line.system  .log-msg{color:var(--cyan)}
.log-line.event   .log-msg{color:var(--purple)}
.log-line.info    .log-msg{color:var(--text)}

/* ── Alerts ── */
.alert-line{display:flex;align-items:flex-start;gap:10px;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.03)}
.adot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px}
.adot.low     {background:#23d18b;box-shadow:0 0 4px #23d18b}
.adot.medium  {background:#e5c07b;box-shadow:0 0 4px #e5c07b}
.adot.high    {background:#e06c75;box-shadow:0 0 4px #e06c75}
.adot.critical{background:#c678dd;box-shadow:0 0 6px #c678dd;animation:pulse 1.2s ease-in-out infinite}
.abody{flex:1;min-width:0}
.ameta{display:flex;gap:8px;align-items:center;margin-bottom:2px}
.asev{font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:.5px}
.asev.low{color:#23d18b}.asev.medium{color:#e5c07b}.asev.high{color:#e06c75}.asev.critical{color:#c678dd}
.ats{color:var(--dim);font-size:10px}
.amsg{color:var(--text);white-space:pre-wrap;word-break:break-word;font-size:13px;line-height:1.5}

/* ── Warnings ── */
.warn-line{display:flex;align-items:flex-start;gap:10px;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.03)}
.warn-line.flash-warn{animation:flashwarn .8s ease-out}
@keyframes flashwarn{0%{background:rgba(229,192,123,.12)}100%{background:transparent}}
.wdot{width:8px;height:8px;border-radius:50%;background:var(--yellow);box-shadow:0 0 4px var(--yellow);flex-shrink:0;margin-top:6px}
.wbody{flex:1;min-width:0}
.wuser{color:var(--yellow);font-size:13px;font-weight:bold}
.wreason{color:var(--text);font-size:12px;margin-top:2px}
.wmeta{color:var(--dim);font-size:10px;margin-top:3px}
.wbadge{background:var(--red);color:#fff;border-radius:10px;padding:1px 8px;font-size:11px;font-weight:bold;flex-shrink:0;margin-top:3px}
.wlive{display:inline-block;background:var(--green);color:#000;border-radius:3px;padding:0 5px;font-size:9px;font-weight:bold;letter-spacing:.5px;margin-left:6px;vertical-align:middle}

/* ── Control Panel ── */
.ctrl-scroll{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch}
.ctrl-scroll::-webkit-scrollbar{width:3px}
.ctrl-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.csect{margin-bottom:18px}
.csect-title{color:var(--dim);font-size:10px;font-weight:bold;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.csect-title::after{content:'';flex:1;height:1px;background:var(--border)}
.crow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
.cbtn{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 14px;border-radius:6px;border:none;font-family:inherit;font-size:13px;font-weight:bold;cursor:pointer;transition:filter .1s;min-height:42px;touch-action:manipulation}
.cbtn:active{filter:brightness(.85)}
.cbtn:disabled{opacity:.4;cursor:not-allowed}
.cbtn.danger {background:#e06c75;color:#fff}
.cbtn.success{background:#23d18b;color:#000}
.cbtn.primary{background:#61afef;color:#000}
.cselect{background:var(--bg);border:1px solid var(--border);color:var(--bright);padding:9px 10px;border-radius:6px;font-family:inherit;font-size:13px;outline:none;flex:1;min-height:42px}
.cselect:focus{border-color:var(--blue)}
.cselect option{background:var(--panel)}
.cnum{background:var(--bg);border:1px solid var(--border);color:var(--bright);padding:9px 10px;border-radius:6px;font-family:inherit;font-size:13px;outline:none;width:70px;text-align:center;min-height:42px}
.cstatus{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;margin-bottom:8px;font-size:12px}
.csdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.csdot.on {background:var(--red);box-shadow:0 0 4px var(--red)}
.csdot.off{background:var(--green)}
.cslabel{flex:1;color:var(--dim)}
.csval{color:var(--bright);font-weight:bold}
.cnote{color:var(--dim);font-size:11px;margin-bottom:8px;line-height:1.5}

/* ── Toast ── */
.toast{position:fixed;bottom:calc(var(--tab-h) + 12px);right:12px;left:12px;background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--green);border-radius:6px;padding:10px 14px;font-size:13px;color:var(--bright);z-index:200;pointer-events:none;animation:slideup .2s ease;text-align:center}
@media(min-width:701px){.toast{left:auto;width:280px;bottom:16px;right:16px}}
.toast.warn{border-left-color:var(--yellow)}
.toast.err{border-left-color:var(--red)}
@keyframes slideup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes flash{0%{background:rgba(97,175,239,.1)}100%{background:transparent}}
.flash{animation:flash .5s ease-out}
</style>
</head>
<body>

<div id="login-overlay">
  <h1>⚡ MAFIA MARKET</h1>
  <div class="sub">ADMIN DASHBOARD</div>
  <div class="note">Verifying your Discord session...</div>
  <div id="login-error">⚠ Session invalid — redirecting...</div>
</div>

<div id="app">
  <div id="topbar">
    <div class="logo">⚡ MM</div>
    <div class="tbadge">ADMIN</div>
    <div class="tbadge" id="session-badge">0s</div>
    <div class="status-dot" id="status-dot" style="margin-left:8px"></div>
    <div class="status-label" id="status-label">connecting...</div>
    <div id="user-info">
      <img id="user-avatar" src="__AVATAR__" alt="">
      <span id="user-name">__USERNAME__</span>
      <a id="logout-btn" href="/auth/logout">logout</a>
    </div>
  </div>

  <div id="grid">
    <!-- Terminal -->
    <div class="panel active" id="panel-terminal">
      <div class="ph">
        <span style="color:var(--green)">●</span>
        <span class="title">TERMINAL</span>
        <span class="cnt" id="log-count">0</span>
        <button class="pbtn" onclick="clearLogs()">clear</button>
      </div>
      <div class="scroll" id="log-area"><div class="empty">Waiting for bot logs...</div></div>
    </div>

    <!-- Alerts -->
    <div class="panel" id="panel-alerts">
      <div class="ph">
        <span style="color:var(--red)">●</span>
        <span class="title">ALERTS</span>
        <span class="cnt" id="alert-count">0</span>
        <button class="pbtn" onclick="clearAlerts()">clear</button>
      </div>
      <div class="scroll" id="alert-area"><div class="empty">No alerts yet...</div></div>
    </div>

    <!-- Warnings -->
    <div class="panel" id="panel-warnings">
      <div class="ph">
        <span style="color:var(--yellow)">●</span>
        <span class="title">WARNINGS</span>
        <span class="wlive">LIVE</span>
        <span class="cnt" id="warn-count">0</span>
        <button class="pbtn" onclick="loadWarnings()">↻</button>
      </div>
      <div class="scroll" id="warn-area"><div class="empty">Loading warnings...</div></div>
    </div>

    <!-- Control Panel -->
    <div class="panel" id="panel-control">
      <div class="ph">
        <span style="color:var(--purple)">●</span>
        <span class="title">CONTROL PANEL</span>
      </div>
      <div class="ctrl-scroll" id="ctrl-area"><div class="empty">Loading...</div></div>
    </div>
  </div>

  <!-- Mobile tab bar -->
  <nav id="tab-bar">
    <button class="tab-item active" onclick="switchTab('terminal',this)">
      <span class="tab-icon">💻</span>Terminal
    </button>
    <button class="tab-item" onclick="switchTab('alerts',this)">
      <span class="tab-icon">🚨</span>Alerts
      <span class="tab-badge" id="alert-tab-badge">0</span>
    </button>
    <button class="tab-item" onclick="switchTab('warnings',this)">
      <span class="tab-icon">⚠️</span>Warnings
    </button>
    <button class="tab-item" onclick="switchTab('control',this)">
      <span class="tab-icon">🛡️</span>Control
    </button>
  </nav>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────
let ws, logCount=0, alertCount=0, warnCount=0, sessionStart=Date.now();
let channels=[], lockdownActive=false, raidModeActive=false, invitesLocked=false;
const MAX_DOM=300;
const SESSION_TOKEN='__SESSION_TOKEN__';

// ── Mobile tab switching ──────────────────────────────────────────
function switchTab(name, btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='alerts'){
    document.getElementById('alert-tab-badge').style.display='none';
  }
}

// ── Boot ──────────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  if(!SESSION_TOKEN){window.location.href='/auth/login';return;}
  connectWS(SESSION_TOKEN);
});

function getSessionToken(){return SESSION_TOKEN;}

// ── WebSocket ─────────────────────────────────────────────────────
function connectWS(tok){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(proto+'//'+location.host);
  ws.onopen=()=>ws.send(JSON.stringify({type:'auth',payload:{sessionToken:tok}}));
  ws.onmessage=(e)=>{
    const{type,payload}=JSON.parse(e.data);
    if(type==='auth_fail'){
      document.getElementById('login-error').style.display='block';
      setTimeout(()=>{window.location.href='/auth/login';},1500);
      ws.close();return;
    }
    if(type==='auth_ok'){
      document.getElementById('login-overlay').style.display='none';
      document.getElementById('app').style.display='flex';
      setStatus(true);startTick();loadWarnings();loadChannels();
      return;
    }
    if(type==='catchup_logs'){document.getElementById('log-area').innerHTML='';payload.forEach(e=>appendLog(e,false));return;}
    if(type==='catchup_alerts'){payload.forEach(e=>appendAlert(e,false));return;}
    if(type==='log')        {appendLog(payload,true);return;}
    if(type==='alert')      {appendAlert(payload,true);return;}
    if(type==='warning_new'){appendWarning(payload,true);return;}
    if(type==='channels')   {channels=payload;renderCtrl();return;}
  };
  ws.onclose=()=>{setStatus(false);setTimeout(()=>connectWS(getSessionToken()),3000);};
  ws.onerror=()=>ws.close();
}

function setStatus(on){
  document.getElementById('status-dot').className='status-dot'+(on?' online':'');
  document.getElementById('status-label').textContent=on?'live':'reconnecting...';
}
function startTick(){
  sessionStart=Date.now();
  setInterval(()=>{
    const s=Math.floor((Date.now()-sessionStart)/1000);
    const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
    document.getElementById('session-badge').textContent=(h?h+'h ':'')+( m?m+'m ':'')+ss+'s';
  },1000);
}

// ── Terminal ──────────────────────────────────────────────────────
function classifyLog(msg){
  if(/✅|saved|online|ready|sent|loaded|cleared|reset|registered/i.test(msg))return 'success';
  if(/❌|error|fail|crash/i.test(msg))return 'error';
  if(/⚠|warn/i.test(msg))return 'warn';
  if(/^\[/.test(msg))return 'system';
  if(/📦|🗓|🔗|🎫|📄|💰|🤖/.test(msg))return 'event';
  return 'info';
}
function fmtTs(iso){return new Date(iso).toLocaleTimeString('en-GB',{hour12:false});}

function appendLog(entry,flash){
  const area=document.getElementById('log-area');
  area.querySelector('.empty')?.remove();
  const level=entry.level!=='info'?entry.level:classifyLog(entry.msg);
  const el=document.createElement('div');
  el.className='log-line '+level+(flash?' flash':'');
  el.innerHTML='<span class="log-ts">'+fmtTs(entry.ts)+'</span><span class="log-msg">'+esc(entry.msg)+'</span>';
  area.appendChild(el);
  while(area.children.length>MAX_DOM)area.removeChild(area.firstChild);
  document.getElementById('log-count').textContent=++logCount;
  if(flash)area.scrollTop=area.scrollHeight;
}
function clearLogs(){document.getElementById('log-area').innerHTML='<div class="empty">Terminal cleared.</div>';logCount=0;document.getElementById('log-count').textContent=0;}

// ── Alerts ────────────────────────────────────────────────────────
function appendAlert(entry,flash){
  const area=document.getElementById('alert-area');
  area.querySelector('.empty')?.remove();
  const sev=entry.severity||'medium';
  const el=document.createElement('div');
  el.className='alert-line'+(flash?' flash':'');
  el.innerHTML='<div class="adot '+sev+'"></div><div class="abody"><div class="ameta"><span class="asev '+sev+'">'+sev+'</span><span class="ats">'+fmtTs(entry.ts)+'</span></div><div class="amsg">'+esc(entry.msg)+'</div></div>';
  area.appendChild(el);
  while(area.children.length>MAX_DOM)area.removeChild(area.firstChild);
  document.getElementById('alert-count').textContent=++alertCount;
  // Show badge on mobile tab if not on alerts tab
  if(flash && !document.getElementById('panel-alerts').classList.contains('active')){
    const b=document.getElementById('alert-tab-badge');
    b.style.display='inline';b.textContent=alertCount;
  }
  if(flash)area.scrollTop=area.scrollHeight;
}
function clearAlerts(){document.getElementById('alert-area').innerHTML='<div class="empty">No alerts yet...</div>';alertCount=0;document.getElementById('alert-count').textContent=0;}

// ── Warnings ──────────────────────────────────────────────────────
function appendWarning(w,flash){
  const area=document.getElementById('warn-area');
  area.querySelector('.empty')?.remove();
  const el=document.createElement('div');
  el.className='warn-line'+(flash?' flash-warn':'');
  el.innerHTML=
    '<div class="wdot"></div>'+
    '<div class="wbody">'+
      '<div class="wuser">'+esc(w.user_tag||w.user_id)+(flash?'<span class="wlive">NEW</span>':'')+'</div>'+
      '<div class="wreason">'+esc(w.reason||'No reason given')+'</div>'+
      '<div class="wmeta">by '+esc(w.moderator_tag||'AutoMod')+' · '+fmtTs(w.created_at)+'</div>'+
    '</div>'+
    (w.total?'<div class="wbadge">'+w.total+'</div>':'');
  if(area.firstChild)area.insertBefore(el,area.firstChild);
  else area.appendChild(el);
  while(area.children.length>MAX_DOM)area.removeChild(area.lastChild);
  document.getElementById('warn-count').textContent=++warnCount;
  if(flash)area.scrollTop=0;
}
async function loadWarnings(){
  const area=document.getElementById('warn-area');
  area.innerHTML='<div class="empty">Loading...</div>';
  warnCount=0;
  try{
    const r=await fetch('/api/warnings',{credentials:'include'});
    const data=await r.json();
    if(!r.ok){area.innerHTML='<div class="empty" style="color:var(--red)">Error.</div>';return;}
    if(!data.length){area.innerHTML='<div class="empty">No active warnings.</div>';document.getElementById('warn-count').textContent=0;return;}
    area.innerHTML='';
    const totals={};
    for(const w of data)totals[w.user_id]=(totals[w.user_id]||0)+1;
    for(const w of data)appendWarning({...w,total:totals[w.user_id]},false);
  }catch{area.innerHTML='<div class="empty" style="color:var(--red)">Failed.</div>';}
}

// ── Control Panel ─────────────────────────────────────────────────
async function loadChannels(){
  try{
    const r=await fetch('/api/channels',{credentials:'include'});
    if(r.ok)channels=await r.json();
  }catch{}
  renderCtrl();
}
function renderCtrl(){
  const a=document.getElementById('ctrl-area');
  const chOpts=channels.map(c=>'<option value="'+esc(c.id)+'">'+(c.parentName?'['+esc(c.parentName)+'] ':''  )+'#'+esc(c.name)+'</option>').join('');
  const slowOpts=[0,5,10,30,60,120,300,600,3600].map(s=>'<option value="'+s+'">'+(s===0?'Off':s<60?s+'s':s<3600?(s/60)+'m':'1h')+'</option>').join('');
  a.innerHTML=`
<div class="csect">
  <div class="csect-title">Status</div>
  <div class="cstatus"><div class="csdot ${lockdownActive?'on':'off'}"></div><div class="cslabel">Lockdown</div><div class="csval">${lockdownActive?'ACTIVE':'Off'}</div></div>
  <div class="cstatus"><div class="csdot ${raidModeActive?'on':'off'}"></div><div class="cslabel">Raid Mode</div><div class="csval">${raidModeActive?'ACTIVE':'Off'}</div></div>
  <div class="cstatus"><div class="csdot ${invitesLocked?'on':'off'}"></div><div class="cslabel">Invites</div><div class="csval">${invitesLocked?'LOCKED':'Open'}</div></div>
</div>
<div class="csect">
  <div class="csect-title">Channel Lockdown</div>
  <div class="crow">
    <button class="cbtn danger" onclick="ctrlAction('lockdown')">🔒 Lock All</button>
    <button class="cbtn success" onclick="ctrlAction('unlock')">🔓 Unlock All</button>
  </div>
</div>
<div class="csect">
  <div class="csect-title">Slowmode</div>
  <div class="crow">
    <select class="cselect" id="sm-ch"><option value="">— select channel —</option>${chOpts}</select>
  </div>
  <div class="crow">
    <select class="cselect" id="sm-val">${slowOpts}</select>
    <button class="cbtn primary" onclick="ctrlSlowmode()">Set</button>
  </div>
</div>
<div class="csect">
  <div class="csect-title">Invite Controls</div>
  <div class="crow">
    <button class="cbtn danger" onclick="ctrlAction('lock_invites',null,true)">🚫 Lock + Delete All</button>
    <button class="cbtn success" onclick="ctrlAction('unlock_invites')">✅ Re-enable</button>
  </div>
</div>
<div class="csect">
  <div class="csect-title">Anti-Raid</div>
  <div class="crow">
    <button class="cbtn danger" onclick="ctrlAction('enable_raid_mode',null,true)">🛡️ Enable Raid Mode</button>
    <button class="cbtn success" onclick="ctrlAction('disable_raid_mode')">🛡️ Disable</button>
  </div>
  <div class="cnote">Sets verification to VERY HIGH — phone number required</div>
  <div class="crow">
    <span style="color:var(--dim);font-size:12px;white-space:nowrap">Ban last</span>
    <input class="cnum" type="number" id="ban-min" value="10" min="1" max="60">
    <span style="color:var(--dim);font-size:12px">min joins</span>
    <button class="cbtn danger" onclick="ctrlBanRecent()">🔨 Ban</button>
  </div>
</div>`;
}

async function ctrlAction(action,payload,confirm_=false){
  if(confirm_&&!confirm('Are you sure: '+action+'?'))return;
  try{
    const r=await fetch('/control',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({action,payload})});
    const d=await r.json();
    if(!r.ok){toast('❌ '+(d.error||'Error'),'err');return;}
    if(action==='lockdown')lockdownActive=true;
    if(action==='unlock')lockdownActive=false;
    if(action==='enable_raid_mode')raidModeActive=true;
    if(action==='disable_raid_mode')raidModeActive=false;
    if(action==='lock_invites')invitesLocked=true;
    if(action==='unlock_invites')invitesLocked=false;
    renderCtrl();
    toast('✅ '+action,'ok');
  }catch(e){toast('❌ '+e.message,'err');}
}
function ctrlSlowmode(){
  const ch=document.getElementById('sm-ch').value;
  const sec=parseInt(document.getElementById('sm-val').value)||0;
  if(!ch){toast('Select a channel first','warn');return;}
  ctrlAction('slowmode',{channelId:ch,seconds:sec});
}
function ctrlBanRecent(){
  const min=parseInt(document.getElementById('ban-min').value)||10;
  if(!confirm('Ban ALL members who joined in the last '+min+' min?'))return;
  ctrlAction('ban_recent_joins',{minutes:min});
}

let toastTimer;
function toast(msg,type='ok'){
  document.querySelector('.toast')?.remove();clearTimeout(toastTimer);
  const t=document.createElement('div');t.className='toast '+type;t.textContent=msg;
  document.body.appendChild(t);toastTimer=setTimeout(()=>t.remove(),3000);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
